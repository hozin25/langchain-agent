appId: com.hozin.langchain-agent-desktop
productName: LangChain Code Agent
directories:
  output: release
files:
  - out/**/*
  - package.json
asar: true
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
